<!DOCTYPE html>
<html>
<head>
    <title>GeoLog Dashboard></title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { 
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([-36.8485, 174.7633], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

    fetch('http://localhost:5033/api/logs')
        .then(res => res.json())
        .then(data => {
            data.forEach(log => {
                const color = log.statusCode >= 500 ? 'red' : 'green';

                console.log("marker:", log.lat, log.lng, color);

                L.circleMarker([log.lat, log.lng], {
                    color : color,
                    radius: 8
                })
                .addTo(map)
                .bindPopup(log.endpoint + " (" + log.statusCode + ")");
            });
        });
</script>

</body>
</html>
