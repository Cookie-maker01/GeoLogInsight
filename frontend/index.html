<!DOCTYPE html>
<html>
<head>
    <title>GeoLog Dashboard></title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { 
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

<script>
    const map = L.map('map').setView([-36.8485, 174.7633], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

    fetch('http://localhost:5033/api/logs')
        .then(res => res.json())
        .then(data => {
            data.forEach(log => {
                const color = log.statusCode >= 500 ? 'red' : 'green';

                console.log("marker:", log.lat, log.lng, color);

                L.circleMarker([log.lat, log.lng], {
                    color : color,
                    radius: 8
                })
                .addTo(map)
                .bindPopup(`${log.endpoint} (${log.statusCode})`);
            });
        });

    //SignalR realtime connection
    const connection = new signalR.HubConnectionBuilder()
        .withUrl("http://localhost:5033/logHub")
        .build();

    connection.on("ReceiveLog", function (log) {

        console.log("realtime data:", log);

        const color = log.statusCode >= 500 ? 'red' : 'green';

        L.circleMarker([log.lat, log.lng], {
            color: color,
            radius: 10
        })
        .addTo(map)
        .bindPopup(`realtime: ${log.endpoint} (${log.statusCode})`);
    });

    connection.start()
        .then(() => {
            console.log("SignalR Connected");

            setInterval(() => {
                fetch('http://localhost:5033/api/logs');
            }, 3000);
        })
        .catch(err => console.error("SignalR Failed:", err));

</script>

</body>
</html>
